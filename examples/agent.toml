# Example ztp-agent config file.
# Copy to /etc/ztp/agent.toml and edit.
#
# All settings here can be overridden by environment variables (ZTP_*) or
# CLI flags. Precedence: CLI flag > env var > this file > compiled default.

# ── Server discovery ──────────────────────────────────────────────────────────

# Explicit ZTP server URL. Takes precedence over mDNS discovery.
# server = "https://ztp.example.com"

# Comma-separated list of fallback server URLs tried in order.
# Also configurable via the ZTP_SERVER_LIST environment variable.
server_list = "https://ztp.local:8443,https://172.17.0.1:8443,,https://127.0.0.1:8443"

# Discover the server automatically on the local network via mDNS/DNS-SD.
# mdns = false

# mDNS service type. Only change when the server uses a custom service name.
# mdns_service = "_ztp._tcp"

# ── Trust anchoring ───────────────────────────────────────────────────────────

# Base64-encoded Ed25519 public key used to verify the provisioning bundle.
# Recommended for production — prevents MITM delivering a rogue bundle.
# If omitted, the key is fetched via TOFU on first contact.
# server_pubkey = ""

# Path to a file containing the base64-encoded server public key.
# Defaults to /etc/ztp/server.pub; silently ignored when the file is absent.
# Takes effect only when server_pubkey is not set.
# server_pubkey_file = "/etc/ztp/server.pub"

# Path to a PEM CA certificate that signed the server's TLS certificate.
# When set, TLS verification is anchored to this CA instead of system roots.
# ca = "/etc/ztp/server-ca.pem"

# ── Device identity ───────────────────────────────────────────────────────────

# Path to the device's long-lived Ed25519 identity key.
# Created automatically on first run with permissions 0600.
identity = "/var/lib/ztp/identity.key"

# Override the device ID sent in the enroll request.
# Resolved automatically from /etc/device-id, /var/lib/ztp/device-id,
# or the `tedge-identity` command if not set here.
# device_id = ""

# ── Bootstrap token ───────────────────────────────────────────────────────────

# Bootstrap token for first-contact allowlisting (optional).
# token = ""

# Path to a file containing the bootstrap token (alternative to `token`).
# token_file = "/etc/ztp/bootstrap.token"

# ── Appliers ──────────────────────────────────────────────────────────────────

# Directory of drop-in POSIX applier scripts (one per module type).
# appliers = "/etc/ztp/appliers.d"

# Append-only log file for all applier output (raw stdout/stderr from each
# applier script, with section headers).
applier_log = "/var/log/ztp/applier.log"

# Append-only mirror of the agent's own log output (the same lines the agent
# prints to stderr / journald). Useful on devices whose journald is volatile
# (tmpfs-backed) so provisioning history survives reboots. Independent of
# applier_log above. Also settable via ZTP_LOG_FILE.
log_file = "/var/log/ztp/agent.log"

# Size-based rotation for log_file. When the current file would grow past
# log_file_max_bytes, it is renamed to <path>.1 (cascading older backups one
# slot down) and a fresh file is opened. Older backups beyond
# log_file_max_backups are deleted. Defaults: 1 MiB cap, 3 backups kept —
# i.e. up to ~4 MiB of total disk use for the agent log.
# Set log_file_max_bytes = 0 to disable rotation (file grows unbounded).
# Set log_file_max_backups = 0 to truncate in place instead of keeping
# rotated copies — bounds disk use to log_file_max_bytes flat but loses
# everything older than the cap.
# log_file_max_bytes = 1048576
# log_file_max_backups = 3

# Applier debug verbosity: "verbose" logs all output; "trace" adds sh -x.
# Also settable via ZTP_APPLIER_DEBUG.
# applier_debug = ""

# ── Transport ─────────────────────────────────────────────────────────────────

# Ordered comma-separated list of transports to attempt.
# Tokens: http, ble, auto
#   auto  — http on all builds; http+ble on BLE-capable Linux builds.
#   http  — HTTPS directly to server/server_list candidates.
#   ble   — BLE peripheral mode (Linux + BlueZ only).
# transport = "auto"

# Interval between background HTTP/mDNS rescans after the initial probe fails.
# When > 0 (the default) the agent keeps re-running mDNS discovery and
# TCP-probing the static server_list URLs at this cadence, racing the
# resulting attempts against any BLE peripheral session. As soon as a server
# becomes reachable (e.g. when a network cable is plugged in mid-boot), HTTP
# enrollment proceeds and BLE is cancelled. Set to "0s" to disable rescanning
# (legacy one-shot HTTP-then-BLE behaviour). Also settable via ZTP_SCAN_INTERVAL.
# scan_interval = "30s"

# Request fully end-to-end encrypted bundle (X25519+ChaCha20-Poly1305).
# Always use with BLE or other untrusted transports.
# encrypt = false

# Prefix prepended to the device id in the BLE advertising name.
# Default "ztp-" gives names like "ztp-<device-id>" in BLE scanners and nRF Connect.
# Set to "" to advertise the bare device id, or to a custom string like "acme-".
# ble_name_prefix = "ztp-"

# ── Misc ──────────────────────────────────────────────────────────────────────

# Enable verbose (debug) logging.
# verbose = false

# Skip TLS certificate verification entirely. Development/testing only.
# insecure = false

# Bundle dump mode. Also settable via ZTP_DEBUG.
#   "1" / "true" / "yes" — dump then apply
#   "only" / "dump"      — dump then exit without applying
# debug = ""

# ── Sentinel ──────────────────────────────────────────────────────────────────

# Path to the sentinel file written on successful enrollment.
# When this file exists the agent exits 0 immediately (already provisioned).
# Set to empty string to disable both the check and the creation.
# sentinel = "/var/lib/ztp/provisioned"

# Skip the sentinel check and re-run enrollment even if already provisioned.
# Useful for local testing without deleting the sentinel manually.
# force = false
