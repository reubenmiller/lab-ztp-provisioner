# tedge-zerotouch-provisioning local stack — secure-by-default
#
# Mirrors a real public deployment:
#   - Caddy terminates TLS on :8443 (host) and proxies to ztp-server.
#   - ztp-server is NOT published to the host; the only public surface is Caddy.
#   - admin_token is loaded from deploy/.env (auto-generated by `just up`)
#     and never has a "demo" default. Server refuses to start without one.
#   - Demo devices connect via Caddy with the local CA mounted, exercising
#     the exact same TLS-verified path as a production device on the LAN.
#
# To deploy publicly: change ZTP_SITE_ADDRESS and ZTP_TLS_EMAIL in .env to
# your domain + ops email. Caddy will fetch a real Let's Encrypt cert. The
# rest of the stack is unchanged.

services:
  caddy:
    image: caddy:2-alpine
    container_name: ztp-caddy
    restart: unless-stopped
    ports:
      - "${ZTP_HTTPS_PORT:-8443}:443"
    environment:
      - ZTP_SITE_ADDRESS=${ZTP_SITE_ADDRESS:-localhost}
      - ZTP_TLS_EMAIL=${ZTP_TLS_EMAIL:-internal}
    volumes:
      - ${ZTP_CADDYFILE:-./Caddyfile}:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      default:
        aliases:
          # Demo devices reach the public face at https://ztp from inside
          # the docker network. `tls internal` issues certs valid for any
          # SNI hostname, so this works without extra config.
          - ztp
    depends_on:
      - server

  server:
    build:
      context: ..
      dockerfile: Dockerfile
      target: server
    image: ztp-server:dev
    container_name: ztp-server
    # NOTE: deliberately no `ports:` — server is reachable only via Caddy.
    volumes:
      - ./data:/var/lib/ztp
      - ./config/ztp-server.yaml:/etc/ztp/ztp-server.yaml:ro
      - ./profiles.d:/etc/ztp/profiles.d:ro
    environment:
      - ZTP_LOG=debug
      # The admin token is REQUIRED. `just up` writes a random one to
      # deploy/.env on first run; the server refuses to start otherwise.
      - ZTP_ADMIN_TOKEN
      - C8Y_BASEURL=${C8Y_BASEURL:-${C8Y_HOST:-${C8Y_URL:-}}}
      - C8Y_TENANT=${C8Y_TENANT:-}
      - C8Y_TOKEN=${C8Y_TOKEN:-}
      - C8Y_USER=${C8Y_USER:-}
      - C8Y_USERNAME=${C8Y_USERNAME:-}
      - C8Y_PASSWORD=${C8Y_PASSWORD:-}

  web:
    image: node:22-alpine
    container_name: ztp-web
    working_dir: /app
    # no `ports:` — only accessible via Caddy on ${ZTP_HTTPS_PORT:-8443}
    volumes:
      - ../web:/app
      - web_node_modules:/app/node_modules
      - caddy_data:/shared/caddy-ca:ro
    command: sh -c "corepack enable && pnpm install --frozen-lockfile=false && pnpm dev --host 0.0.0.0"
    environment:
      # Vite dev server proxies /v1/* directly to ztp-server over the
      # internal docker network (plaintext, never exposed to the host).
      # The TLS-terminated path is via Caddy at https://${ZTP_SITE_ADDRESS}:${ZTP_HTTPS_PORT}/.
      - VITE_ZTP_SERVER=http://server:8080
      - NODE_EXTRA_CA_CERTS=/shared/caddy-ca/caddy/pki/authorities/local/root.crt
    depends_on:
      - caddy

  device:
    build:
      context: ..
      dockerfile: Dockerfile
      target: agent
    image: ztp-agent:dev
    container_name: ztp-device-demo
    environment:
      - ZTP_DEVICE_ID=${ZTP_DEVICE_ID:-demo-device-1}
    volumes:
      - ./data:/var/lib/ztp-server:ro
      - device_identity:/var/lib/ztp
      - caddy_data:/shared/caddy-ca:ro
    depends_on:
      - caddy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        for i in $$(seq 1 60); do
          [ -f /var/lib/ztp-server/signing.key.pub ] && \
          [ -f /shared/caddy-ca/caddy/pki/authorities/local/root.crt ] && break
          echo "waiting for server pubkey + caddy CA..."
          sleep 1
        done
        exec /usr/local/bin/ztp-agent \
          -server https://ztp \
          -ca /shared/caddy-ca/caddy/pki/authorities/local/root.crt \
          -server-pubkey "$$(cat /var/lib/ztp-server/signing.key.pub)" \
          -device-id "$$ZTP_DEVICE_ID" \
          -identity /var/lib/ztp/identity.key \
          -appliers /etc/ztp/appliers.d \
          -v

  device-shell:
    build:
      context: ..
      dockerfile: Dockerfile
      target: agent-shell
    image: ztp-agent-shell:dev
    container_name: ztp-device-shell
    environment:
      - ZTP_DEVICE_ID=${ZTP_DEVICE_ID_SHELL:-shell-device-1}
    volumes:
      - ./data:/var/lib/ztp-server:ro
      - device_shell_identity:/var/lib/ztp
      - caddy_data:/shared/caddy-ca:ro
    depends_on:
      - caddy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        for i in $$(seq 1 60); do
          [ -f /var/lib/ztp-server/signing.key.pub ] && \
          [ -f /shared/caddy-ca/caddy/pki/authorities/local/root.crt ] && break
          echo "waiting for server pubkey + caddy CA..."
          sleep 1
        done
        export ZTP_SERVER=https://ztp
        export ZTP_CA=/shared/caddy-ca/caddy/pki/authorities/local/root.crt
        export ZTP_SERVER_PUBKEY="$$(cat /var/lib/ztp-server/signing.key.pub)"
        export ZTP_IDENTITY_KEY=/var/lib/ztp/identity.pem
        export ZTP_APPLIERS_DIR=/etc/ztp/appliers.d
        exec /usr/local/bin/ztp-agent.sh

  mdns:
    build:
      context: ..
      dockerfile: Dockerfile
      target: mdns
    image: ztp-mdns:dev
    container_name: ztp-mdns
    profiles: ["mdns"]
    network_mode: host
    restart: unless-stopped
    command:
      - -service=_ztp._tcp
      - -port=${ZTP_HTTPS_PORT:-8443}
      - -server-url=https://${ZTP_SITE_ADDRESS:-localhost}:${ZTP_HTTPS_PORT:-8443}
    depends_on:
      - caddy

volumes:
  caddy_data:
  caddy_config:
  web_node_modules:
  device_identity:
  device_shell_identity:
