listen: ":8080"
# admin_token is intentionally NOT set here. The server reads it from the
# ZTP_ADMIN_TOKEN environment variable (auto-generated by `just up` into
# deploy/.env on first run) and refuses to start without one. There is no
# insecure default — this is what makes the local stack safe to mirror to
# production unchanged.

# Persisted Ed25519 signing key. The server will write a freshly generated key
# here on first start, then reuse it across restarts so devices that already
# trust this server's public key keep working.
signing_key_file: "/var/lib/ztp/signing.key"
signing_key_id: "ztp-server-demo"

# Persisted age (X25519) key for SOPS-age decryption of profile files. Auto-
# generated on first start; the matching public key is written next to it as
# "age.key.pub" so operators (and ztpctl) can fetch the recipient without
# grepping logs. Add additional `age_recipients:` entries below if multiple
# operators need to be able to decrypt.
age_key_file: "/var/lib/ztp/age.key"
# age_recipients:
#   - age1...           # extra operator pubkey #1
#   - age1...           # extra operator pubkey #2

clock_skew: "5m"

# Persistent SQLite store.
store:
  driver: "sqlite"
  dsn:    "/var/lib/ztp/ztp.db"

verifiers:
  - allowlist
  - bootstrap_token
  - known_keypair

# Optional: announce on the LAN so agents with no configured server URL find us.
# Inside the Docker compose stack, the server runs behind Caddy. The server's
# own address (server:8080, plain HTTP) is not reachable by devices — they must
# go via Caddy. So we advertise Caddy's Docker-internal address (ztp:443).
# This is visible to device containers on the same Docker network; the external
# `just mdns-publish-macos` script handles LAN advertisement for physical devices.
mdns:
  enabled: true
  service: "_ztp._tcp"
  port:    8080
  public_host:   "ztp"    # Docker network alias for the Caddy container
  public_port:   443      # Caddy's internal HTTPS port
  public_scheme: "https"

# Provisioning profiles are loaded from this directory (one YAML per
# profile). The default profile lives in deploy/profiles.d/default.yaml,
# bind-mounted into the server container as /etc/ztp/profiles.d/default.yaml.
profiles_dir: "/etc/ztp/profiles.d"
default_profile: "default"
