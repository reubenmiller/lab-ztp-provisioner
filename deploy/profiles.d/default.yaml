# Default provisioning profile for the docker-compose demo stack.
#
# Edit this file (or add new profiles next to it) and either restart the
# server or POST /v1/admin/profiles/reload to pick up changes.

name: default
description: "Demo profile used by the docker-compose stack."
priority: 0
