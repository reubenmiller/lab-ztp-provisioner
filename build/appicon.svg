<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2544"/>
      <stop offset="100%" style="stop-color:#1a4a6e"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#b8d8f0"/>
    </linearGradient>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c6c6"/>
      <stop offset="100%" style="stop-color:#00e5c8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- App icon background: rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle inner vignette highlight -->
  <ellipse cx="256" cy="160" rx="200" ry="120" fill="#1e5080" opacity="0.35"/>

  <!-- Wireless arcs (provisioning signal), centered above chip -->
  <!-- Outermost arc -->
  <path d="M 146 272 A 140 140 0 0 1 366 272" fill="none" stroke="url(#arc)" stroke-width="14" stroke-linecap="round" opacity="0.5" filter="url(#glow)"/>
  <!-- Middle arc -->
  <path d="M 176 272 A 100 100 0 0 1 336 272" fill="none" stroke="url(#arc)" stroke-width="14" stroke-linecap="round" opacity="0.72" filter="url(#glow)"/>
  <!-- Inner arc -->
  <path d="M 208 272 A 60 60 0 0 1 304 272" fill="none" stroke="url(#arc)" stroke-width="14" stroke-linecap="round" opacity="1.0" filter="url(#glow)"/>

  <!-- Chip body -->
  <rect x="196" y="282" width="120" height="100" rx="12" ry="12" fill="url(#chip)"/>
  <!-- Chip inner die -->
  <rect x="218" y="302" width="76" height="60" rx="6" ry="6" fill="#1a4a6e" opacity="0.55"/>
  <!-- Chip inner grid lines -->
  <line x1="237" y1="302" x2="237" y2="362" stroke="#6ab4e0" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="302" x2="256" y2="362" stroke="#6ab4e0" stroke-width="1.5" opacity="0.5"/>
  <line x1="275" y1="302" x2="275" y2="362" stroke="#6ab4e0" stroke-width="1.5" opacity="0.5"/>
  <line x1="218" y1="322" x2="294" y2="322" stroke="#6ab4e0" stroke-width="1.5" opacity="0.5"/>
  <line x1="218" y1="342" x2="294" y2="342" stroke="#6ab4e0" stroke-width="1.5" opacity="0.5"/>

  <!-- Chip pins - top (3) -->
  <rect x="220" y="270" width="12" height="14" rx="3" fill="#b8d8f0"/>
  <rect x="250" y="270" width="12" height="14" rx="3" fill="#b8d8f0"/>
  <rect x="280" y="270" width="12" height="14" rx="3" fill="#b8d8f0"/>
  <!-- Chip pins - bottom (3) -->
  <rect x="220" y="380" width="12" height="14" rx="3" fill="#b8d8f0"/>
  <rect x="250" y="380" width="12" height="14" rx="3" fill="#b8d8f0"/>
  <rect x="280" y="380" width="12" height="14" rx="3" fill="#b8d8f0"/>
  <!-- Chip pins - left (2) -->
  <rect x="182" y="300" width="14" height="12" rx="3" fill="#b8d8f0"/>
  <rect x="182" y="352" width="14" height="12" rx="3" fill="#b8d8f0"/>
  <!-- Chip pins - right (2) -->
  <rect x="316" y="300" width="14" height="12" rx="3" fill="#b8d8f0"/>
  <rect x="316" y="352" width="14" height="12" rx="3" fill="#b8d8f0"/>

  <!-- Checkmark / dot at the apex of arcs (ZTP signal source) -->
  <circle cx="256" cy="272" r="10" fill="#00e5c8" filter="url(#softglow)"/>
  <circle cx="256" cy="272" r="5" fill="white"/>

  <!-- Subtle corner dots for circuit-board feel -->
  <circle cx="100" cy="100" r="6" fill="#00c6c6" opacity="0.25"/>
  <circle cx="412" cy="100" r="6" fill="#00c6c6" opacity="0.25"/>
  <circle cx="100" cy="412" r="6" fill="#00c6c6" opacity="0.25"/>
  <circle cx="412" cy="412" r="6" fill="#00c6c6" opacity="0.25"/>
</svg>
